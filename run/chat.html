<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PJIRC Web Chat</title>
  <script src="https://cjrtnc.leaningtech.com/4.0/cj3loader.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #eee;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 1.4em;
    }
    .chat-container {
      border: 1px solid #444;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <h1>PJIRC &mdash; Plouf's Java IRC Client</h1>
  <div class="chat-container">
    <cheerpj-applet
      archive="pjirc.jar"
      code="IRCApplet"
      width="900"
      height="600"
      param_nick="WebUser"
      param_fullname="PJIRC Web User"
      param_host="irc.libera.chat"
      param_port="6667"
      param_gui="pixx"
      param_language="english">
    </cheerpj-applet>
  </div>
</body>
</html>
